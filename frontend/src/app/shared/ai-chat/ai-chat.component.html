<div class="ai-chat-container">
  <!-- Chat Toggle Button -->
  <button 
    class="chat-toggle-btn" 
    (click)="toggleChat()"
    [class.active]="showChat"
    title="AI Hotel Assistant">
    <i class="pi pi-comments"></i>
    <span class="btn-text">AI Assistant</span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" [class.open]="showChat">
    <!-- Chat Header -->
    <div class="chat-header">
      <div class="header-content">
        <i class="pi pi-robot"></i>
        <h3>AI Hotel Assistant</h3>
      </div>
      <div class="header-actions">
        <button class="icon-btn" (click)="clearChat()" title="Clear chat">
          <i class="pi pi-refresh"></i>
        </button>
        <button class="icon-btn close-btn" (click)="toggleChat()" title="Close">
          <i class="pi pi-times"></i>
        </button>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages" #messageContainer>
      <div 
        *ngFor="let message of messages" 
        class="message"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'">
        <div class="message-content">
          <div class="message-text" [innerHTML]="formatMessage(message.content)"></div>
          <div class="message-time">{{formatTime(message.timestamp)}}</div>
        </div>
      </div>
      
      <!-- Loading Indicator -->
      <div *ngIf="isLoading" class="message assistant loading">
        <div class="message-content">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Hotel Recommendations -->
    <div *ngIf="currentRecommendations.length > 0" class="recommendations-panel">
      <h4>Recommended Hotels</h4>
      <div class="recommendations-list">
        <div 
          *ngFor="let hotel of currentRecommendations" 
          class="recommendation-card"
          [routerLink]="['/hotels', hotel._id]">
          <div class="hotel-info">
            <h5>{{hotel.name}}</h5>
            <p class="location"><i class="pi pi-map-marker"></i> {{hotel.location}}</p>
            <p class="rating"><i class="pi pi-star"></i> {{hotel.rating}} stars</p>
          </div>
          <div class="match-score">
            <span class="score-label">Match</span>
            <span class="score-value">{{roundScore(hotel.matchScore)}}%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-input">
      <textarea
        [(ngModel)]="userInput"
        (keydown)="handleKeyPress($event)"
        placeholder="Tell me what you're looking for..."
        [disabled]="isLoading"
        rows="1"
        #inputArea
        (input)="autoResize(inputArea)"></textarea>
      <button 
        class="send-btn" 
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || isLoading"
        title="Send message">
        <i class="pi pi-send"></i>
      </button>
    </div>
  </div>
</div>
